<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ending Hidden Hunger - Rwanda Nutrition Analytics</title>

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://upload.wikimedia.org/wikipedia/commons/1/17/Flag_of_Rwanda.svg"
      type="image/svg+xml"
    />

    <!-- Author & Description -->
    <meta name="author" content="TURINAYO Benoit -Data analysit and project lead, Rwanda" />
    <meta
      name="description"
      content="A data-driven platform mapping malnutrition hotspots and supporting evidence-based nutrition policy in Rwanda."
    />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:title" content="Ending Hidden Hunger - Rwanda Nutrition Analytics" />
    <meta
      property="og:description"
      content="Explore malnutrition indicators, trends, and analytics across Rwanda with interactive visualizations and GIS maps."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://upload.wikimedia.org/wikipedia/commons/1/17/Flag_of_Rwanda.svg"
    />
    <meta property="og:url" content="https://endhange.netlify.app/" />

    <!-- Twitter (Optional) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ending Hidden Hunger - Rwanda Nutrition Analytics" />
    <meta
      name="twitter:description"
      content="Data visualization and analysis platform on nutrition and food security in Rwanda."
    />
    <meta
      name="twitter:image"
      content="https://upload.wikimedia.org/wikipedia/commons/1/17/Flag_of_Rwanda.svg"
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="Rwanda, nutrition, malnutrition, data analysis, food security, health, statistics, GIS, visualization"
    />

    <!-- Optional Theme Color -->
    <meta name="theme-color" content="#2E8B57" />
  </head>

  <body>
    <div id="root"></div>
